# =============================================================================
# Prometheus + Alertmanager — Helm Values
# =============================================================================
# kube-prometheus-stack chart configuration
# Includes Alertmanager with Slack + OpsGenie integration
# =============================================================================

# Grafana: disabled here, installed separately for more control
grafana:
  enabled: false

# ── Prometheus ──────────────────────────────────────────────────────────────

prometheus:
  prometheusSpec:
    # Scrape all ServiceMonitors regardless of labels
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Retention
    retention: 30d
    retentionSize: "45GB"

    # Persistent storage (EBS gp3)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Resources
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi

    # External labels for cross-cluster identification
    externalLabels:
      cluster: gitops-platform
      environment: staging

    # Additional scrape configs for Istio
    additionalScrapeConfigs:
      - job_name: 'istio-mesh'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['istio-system']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: istio-telemetry;prometheus

# ── Alertmanager ────────────────────────────────────────────────────────────

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      slack_api_url: ""  # Set via secret
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-alerts

      routes:
        # Critical alerts → OpsGenie + Slack
        - match:
            severity: critical
          receiver: opsgenie-critical
          continue: true

        # Canary rollback alerts → immediate Slack
        - match:
            alertname: CanaryRollback
          receiver: slack-deployments
          group_wait: 0s

        # Warning alerts → Slack only
        - match:
            severity: warning
          receiver: slack-alerts

    receivers:
      - name: slack-alerts
        slack_configs:
          - channel: '#platform-alerts'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: >-
              *Alert:* {{ .CommonAnnotations.summary }}
              *Severity:* `{{ .CommonLabels.severity }}`
              *Namespace:* `{{ .CommonLabels.namespace }}`
              *Description:* {{ .CommonAnnotations.description }}
              *Runbook:* {{ .CommonAnnotations.runbook_url }}

      - name: slack-deployments
        slack_configs:
          - channel: '#deployments'
            send_resolved: true
            title: '🚀 {{ .CommonAnnotations.summary }}'
            text: >-
              {{ .CommonAnnotations.description }}

      - name: opsgenie-critical
        opsgenie_configs:
          - api_key: ""  # Set via secret
            message: "{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}"
            priority: P1
            tags: "platform,gitops,{{ .CommonLabels.namespace }}"

    templates:
      - '/etc/alertmanager/config/*.tmpl'

# ── Prometheus Rules ────────────────────────────────────────────────────────

additionalPrometheusRulesMap:
  canary-alerts:
    groups:
      - name: canary-alerts
        rules:
          # Alert on Flagger canary rollback
          - alert: CanaryRollback
            expr: flagger_canary_status{status="Failed"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Canary rollback on {{ $labels.name }} in {{ $labels.namespace }}"
              description: "Flagger has rolled back the canary deployment for {{ $labels.name }}"
              runbook_url: "https://wiki.example.com/runbooks/canary-rollback"

          # Alert on high error rate
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(istio_requests_total{
                  response_code=~"5.."
                }[2m])) by (destination_workload, destination_workload_namespace)
                /
                sum(rate(istio_requests_total{}[2m])) by (destination_workload, destination_workload_namespace)
              ) > 0.05
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Error rate > 5% for {{ $labels.destination_workload }}"
              description: "{{ $labels.destination_workload }} in {{ $labels.destination_workload_namespace }} has an error rate above 5%"
              runbook_url: "https://wiki.example.com/runbooks/high-error-rate"

          # Alert on high P99 latency
          - alert: HighLatency
            expr: |
              histogram_quantile(0.99,
                sum(rate(istio_request_duration_milliseconds_bucket[5m])) by (le, destination_workload, destination_workload_namespace)
              ) > 1000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P99 latency > 1s for {{ $labels.destination_workload }}"

          # Alert on pod crash looping
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"
              runbook_url: "https://wiki.example.com/runbooks/pod-crash-looping"

  resource-alerts:
    groups:
      - name: resource-alerts
        rules:
          - alert: HighCPUUtilization
            expr: |
              (sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace)
              /
              sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod, namespace)) > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU utilization on {{ $labels.pod }}"

          - alert: HighMemoryUtilization
            expr: |
              (sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace)
              /
              sum(kube_pod_container_resource_limits{resource="memory"}) by (pod, namespace)) > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory utilization on {{ $labels.pod }}"

# ── Node Exporter ───────────────────────────────────────────────────────────

nodeExporter:
  enabled: true

# ── kube-state-metrics ──────────────────────────────────────────────────────

kubeStateMetrics:
  enabled: true
