# =============================================================================
# Tempo — Helm Values
# =============================================================================
# Distributed tracing backend
# Integrates with Istio auto-injected trace headers
# =============================================================================

tempo:
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Receivers for trace ingestion
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250

  # Storage configuration
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Global overrides
  global_overrides:
    per_tenant_override_config: /runtime-config/overrides.yaml
    max_bytes_per_trace: 5000000  # 5MB max per trace

  # Retention
  compactor:
    compaction:
      block_retention: 72h  # 3 days

# Persistence
persistence:
  enabled: true
  storageClassName: gp3
  size: 20Gi

# Service for Grafana datasource
service:
  type: ClusterIP
  port: 3100

# ServiceMonitor for Prometheus scraping
serviceMonitor:
  enabled: true
  interval: 15s
