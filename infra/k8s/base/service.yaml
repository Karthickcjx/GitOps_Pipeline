# =============================================================================
# Service — Base
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: my-app
  labels:
    app: my-app
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: my-app
