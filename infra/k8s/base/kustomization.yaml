# =============================================================================
# Kustomize Base Configuration
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: my-app-base

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: gitops-platform

images:
  - name: MY_APP_IMAGE
    newName: PLACEHOLDER_ECR_REGISTRY/gitops-platform-my-app
    newTag: latest
