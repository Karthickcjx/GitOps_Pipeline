# =============================================================================
# PodDisruptionBudget — Base
# =============================================================================
# Ensures at least 1 pod is available during voluntary disruptions
# (node drain, rolling update, cluster autoscaler)
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: my-app
  labels:
    app: my-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: my-app
