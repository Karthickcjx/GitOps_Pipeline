# =============================================================================
# Kustomize Production Overlay
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-prod

resources:
  - ../../base
  - canary.yaml

patches:
  - path: patch-replicas.yaml

images:
  - name: MY_APP_IMAGE
    newName: PLACEHOLDER_ECR_REGISTRY/gitops-platform-my-app
    newTag: latest  # Updated by CI pipeline

commonAnnotations:
  environment: production
