# =============================================================================
# Terraform CI/CD — Plan on PR, Apply on merge to main
# =============================================================================
# Runs terraform plan on pull requests for review.
# Runs terraform apply on merge to main (with approval).
# =============================================================================

name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.7.5'

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false  # Never cancel terraform runs

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Detect which environments changed
  # ─────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      staging: ${{ steps.filter.outputs.staging }}
      production: ${{ steps.filter.outputs.production }}
      modules: ${{ steps.filter.outputs.modules }}

    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            staging:
              - 'infra/terraform/environments/staging/**'
              - 'infra/terraform/modules/**'
            production:
              - 'infra/terraform/environments/production/**'
              - 'infra/terraform/modules/**'
            modules:
              - 'infra/terraform/modules/**'

  # ─────────────────────────────────────────────────────────────────────────
  # Terraform Plan (Staging)
  # ─────────────────────────────────────────────────────────────────────────
  plan-staging:
    name: 📋 Plan Staging
    needs: detect-changes
    if: needs.detect-changes.outputs.staging == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gitops-platform-github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/staging
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: infra/terraform/environments/staging
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/environments/staging
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/environments/staging/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan — Staging\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ─────────────────────────────────────────────────────────────────────────
  # Terraform Apply (Staging)
  # ─────────────────────────────────────────────────────────────────────────
  apply-staging:
    name: 🚀 Apply Staging
    needs: plan-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging  # Requires approval
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gitops-platform-github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/staging
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: infra/terraform/environments/staging
        run: terraform apply -input=false -auto-approve

  # ─────────────────────────────────────────────────────────────────────────
  # Terraform Plan (Production) — same pattern
  # ─────────────────────────────────────────────────────────────────────────
  plan-production:
    name: 📋 Plan Production
    needs: detect-changes
    if: needs.detect-changes.outputs.production == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gitops-platform-github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/production
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: infra/terraform/environments/production
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/terraform/environments/production
        run: terraform plan -input=false -no-color -out=tfplan

  apply-production:
    name: 🚀 Apply Production
    needs: plan-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production  # Requires approval
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gitops-platform-github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/production
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: infra/terraform/environments/production
        run: terraform apply -input=false -auto-approve
